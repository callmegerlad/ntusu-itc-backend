services:
  db:
    container_name: SUITC_Database
    image: mysql:8.0
    volumes:
      - ./data/db:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=suitc
      - MYSQL_USER=suitc_user
      - MYSQL_PASSWORD=suitc_password
      - MYSQL_ROOT_PASSWORD=rootpassword
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-usuitc_user", "-psuitc_password"]
      interval: 5s
      timeout: 3s
      retries: 5
  web:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    container_name: SUITC_Backend
    image: suitc_image
    command: python manage.py runserver 0.0.0.0:8888
    volumes:
      - .:/project
    ports:
      - "8888:8888"
    environment:
      - DB_NAME=suitc
      - DB_USER=suitc_user
      - DB_PASSWORD=suitc_password
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
volumes:
  data:
    